<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>註冊 - 班費記帳系統</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="header-section">
            <img src="image/mmmm.PNG" class="header-icon" alt="貓咪">
            <h1>班費記帳系統</h1>
        </div>

        <button id="google-reg-btn" class="google-btn">
            <div class="google-icon-wrapper">
                <img src="image/IMG_0745.PNG" width="18">
            </div>
            使用 Google 帳號註冊
        </button>

        <div class="divider">或者使用 Email 註冊</div>

        <form id="register-form">
            <div class="form-control">
                <label>電子郵件：</label>
                <input type="email" id="reg-email" placeholder="example@gmail.com" required>
            </div>
            <div class="form-control">
                <label>密碼：</label>
                <input type="password" id="reg-password" placeholder="至少 6 位數" required>
            </div>
            <button type="submit" class="btn">建立帳號</button>
            <div class="switch-link">
                已有帳號？ <a href="login.html" class="primary-link">返回登入</a>
            </div>
        </form>
        <p id="message" class="message"></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        // 💡 1. 這裡幫你多引進了 sendEmailVerification 功能
        import { getAuth, createUserWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, sendEmailVerification } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // 使用你提供的配置
        const firebaseConfig = {
            apiKey: "AIzaSyD-bvmNnYsdEIkkeKPFsEakatlhyRH7xEg",
            authDomain: "meow-e7846.firebaseapp.com",
            projectId: "meow-e7846",
            storageBucket: "meow-e7846.firebasestorage.app",
            messagingSenderId: "743672734125",
            appId: "1:743672734125:web:7d9f6fb1cac5b18ef48124"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth();
        const provider = new GoogleAuthProvider();

        // 💡 2. 這裡強制每次點擊 Google 註冊，都必須彈出帳號選擇器
        provider.setCustomParameters({
            prompt: 'select_account'
        });

        // 🚀 Google 快速註冊邏輯
        document.getElementById('google-reg-btn').onclick = async () => {
            try {
                const result = await signInWithPopup(auth, provider);
                localStorage.setItem('currentUser', result.user.email);
                alert("註冊並登入成功！");
                window.location.href = 'index.html';
            } catch (error) {
                console.error(error);
                alert("Google 註冊失敗：" + error.message);
            }
        };

        // 傳統 Email 註冊邏輯
        document.getElementById('register-form').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('reg-email').value;
            const password = document.getElementById('reg-password').value;
            try {
                // A. 先建立帳號
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);

                // 💡 3. 這裡會立刻發送真實驗證信給剛剛填寫的 user 信箱
                await sendEmailVerification(userCredential.user);

                // B. 彈出提示通知
                alert("帳號建立成功！驗證信已寄出，請至信箱點擊驗證連結後再進行登入。");
                window.location.href = 'login.html';
            } catch (error) {
                document.getElementById('message').innerText = "註冊失敗：" + error.message;
            }
        };
    </script>
</body>

</html>
