<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <title>重設密碼</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>重設密碼</h1>
        <p style="color: #666; margin-bottom: 20px;">請輸入 Email，我們會寄送重設郵件給您。</p>
        <form id="reset-form">
            <div class="form-control">
                <input type="email" id="reset-email" placeholder="輸入您的 Email" required>
            </div>
            <button type="submit" class="btn">寄送重設郵件</button>
            <div class="switch-link">
                <a href="login.html" class="text-link">返回登入</a>
            </div>
        </form>
        <p id="message" class="message"></p>
    </div>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // 🚀 使用你原本的配置資訊
        const firebaseConfig = {
            apiKey: "AIzaSyD-bvmNnYsdEIkkeKPFsEakatlhyRH7xEg",
            authDomain: "meow-e7846.firebaseapp.com",
            projectId: "meow-e7846",
            storageBucket: "meow-e7846.firebasestorage.app",
            messagingSenderId: "743672734125",
            appId: "1:743672734125:web:7d9f6fb1cac5b18ef48124"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        document.getElementById('reset-form').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('reset-email').value;
            const messagePara = document.getElementById('message');

            try {
                // 🚀 Firebase 發送重設密碼信件邏輯
                await sendPasswordResetEmail(auth, email);
                alert("重設郵件已寄至：" + email + "\n請檢查您的信箱（包含垃圾郵件箱）。");
                window.location.href = 'login.html'; // 寄出後引導回登入頁
            } catch (error) {
                console.error(error);
                messagePara.innerText = "發送失敗：請確認 Email 是否正確。";
                messagePara.style.color = "red";
            }
        };
    </script>
</body>

</html>
