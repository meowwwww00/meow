<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>重設密碼 - 班費記帳系統</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1><img src="image/mmmm.PNG" class="header-icon" alt="貓咪"> 重設密碼</h1>

        <form id="reset-pw-form">
            <div class="form-control">
                <label for="reset-username">您的帳號：</label>
                <input type="text" id="reset-username" placeholder="請輸入註冊時的帳號" required>
            </div>

            <div class="form-control">
                <label for="new-password">新密碼：</label>
                <input type="password" id="new-password" placeholder="請輸入新密碼 (至少 6 位)" required>
            </div>

            <div class="form-control">
                <label for="confirm-new-password">確認新密碼：</label>
                <input type="password" id="confirm-new-password" placeholder="請再次輸入新密碼" required>
            </div>

            <button type="submit" class="btn">更新密碼</button>

            <div class="switch-link">
                <a href="login.html" style="color: #6d90f2; text-decoration: underline;">返回登入</a>
            </div>
        </form>

        <p id="reset-message" class="message"></p>
    </div>
    <script src="reset_password.js"></script>
</body>

</html>
