<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>班費紀錄明細</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <!-- 頂部標題與返回主頁 -->
        <h1><img src="image/mmmm.PNG" class="header-icon" alt="貓咪"> 班費記帳明細</h1>
        <a href="index.html"><button class="btn back-btn">回主頁面</button></a>

        <!-- 🎯 乾淨的第一層：日期篩選與排序區塊（已刪除重複包裹的 controls-group） -->
        <div class="controls-group">
            <h3>日期篩選與排序</h3>

            <div class="filter-controls">
                <label>搜尋期間：</label>
                <input type="date" id="start-date" class="date-input">
                <span style="margin: 0 5px;">至</span>
                <input type="date" id="end-date" class="date-input">

                <button id="confirmBtn" class="btn-confirm">確定</button>
                <button id="resetBtn" class="btn-reset">全部紀錄</button>
            </div>

            <div class="sort-controls">
                <label>排序方式：</label>
                <button type="button" class="sort-btn" onclick="sortRecords('oldest')">日期由舊到新</button>
                <button type="button" class="sort-btn" onclick="sortRecords('newest')">日期由新到舊</button>
            </div>

            <div class="summary-toggle-area">
                <a href="stats.html" class="btn"
                    style="background-color: #6d90f2; text-decoration: none; display: inline-block; width: auto; padding: 10px 25px; border-radius: 20px; color: white;">
                    查看每月/每年收支統計報表
                </a>
            </div>

            <!-- 🎯 升級後的 LINE 提醒區塊：新增金額輸入欄位 -->
            <div
                style="text-align: center; margin-top: 20px; display: flex; flex-direction: column; align-items: center; gap: 12px;">

                <div
                    style="display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; max-width: 280px;">
                    <label
                        style="font-weight: bold; color: #555; font-size: 15px; white-space: nowrap;">本次催繳金額：$</label>
                    <input type="number" id="remind-amount" placeholder="留空則不顯示金額"
                        style="width: 100%; padding: 8px 12px; border-radius: 12px; border: 1.5px solid #ffb6c1; text-align: center; font-size: 16px; outline: none; box-sizing: border-box;">
                </div>

                <button onclick="remindToLine()"
                    style="background-color: #25cc6be0; color: white; border: none; padding: 12px 35px; border-radius: 50px; font-weight: bold; cursor: pointer; font-size: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 100%; max-width: 200px;">
                    Line提醒通知
                </button>

            </div>

            <!-- 🎯 乾淨的第二層：每月統計盒子（留給 JS 動態注入內容，不再疊床架屋） -->
            <div id="monthly-summary-box" class="summary-hidden">
                <div class="monthly-summary">
                    <!-- 統計資料會由 JS 自動生成在這邊 -->
                </div>
            </div>

            <!-- 🎯 乾淨的第三層：所有交易紀錄清單（拉出來獨立擺放，結構超美） -->
            <div class="transaction-list" style="margin-top: 30px;">
                <h3>所有紀錄</h3>
                <ul id="list">
                    <li style="text-align: center; color: #888; padding: 20px;">載入中...</li>
                </ul>
            </div>

        </div> <!-- Container 結尾 -->

        <!-- 核心驅動腳本 -->
        <script type="module" src="recordDisplay.js"></script>
</body>

</html>
