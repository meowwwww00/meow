<!DOCTYPE html>
<html lang="zh-Hant">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>班費紀錄明細</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1><img src="image/mmmm.PNG" class="header-icon" alt="貓咪"> 班費記帳明細</h1>

        <a href="index.html"><button class="btn back-btn">回主頁面</button></a>
        <div class="controls-group">
            <div class="controls-group">
                <h3>日期篩選與排序</h3>

                <div class="filter-controls">
                    <label>搜尋日期：</label>
                    <input type="date" id="date-filter">
                    <button type="button" class="filter-btn" onclick="resetFilter()">復原</button>
                </div>

                <div class="sort-controls">
                    <label>排序方式：</label>
                    <button type="button" class="sort-btn" onclick="sortRecords('oldest')">日期由舊到新</button>
                    <button type="button" class="sort-btn" onclick="sortRecords('newest')">日期由新到舊</button>
                </div>

                <div class="summary-toggle-area">
                    <a href="stats.html" class="btn"
                        style="background-color: #6d90f2; text-decoration: none; display: inline-block; width: auto; padding: 10px 25px; border-radius: 20px; color: white;">
                        查看每月/每年收支統計報表
                    </a>
                </div>
                <div style="text-align: center; margin-top: 20px;">
                    <button onclick="remindToLine()"
                        style="background-color: #25cc6be0; color: white; border: none; padding: 12px 25px; border-radius: 50px; font-weight: bold; cursor: pointer; font-size: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);">
                        Line提醒通知
                    </button>
                </div>
            </div>

            <div id="monthly-summary-box" class="summary-hidden">
                <div class="monthly-summary">
                </div>
            </div>
        </div>

        <div id="monthly-summary-box" class="summary-hidden">
            <div class="monthly-summary">
                <div class="summary-item">
                    <div class="monthly-summary">
                        <div class="summary-item">
                        </div>
                        <div class="transaction-list">
                            <h3>所有紀錄</h3>
                            <ul id="list">
                            </ul>
                        </div>
                    </div>

                    <script src="recordDisplay.js"></script>
</body>

</html>
