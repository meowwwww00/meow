<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>班費記帳系統</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="user-info">
            <div>
                <span>目前登入：<strong id="display-username"></strong></span>
                <button id="change-pw-btn" class="text-link">修改密碼</button>
            </div>
            <button id="logout-btn" class="logout-link">登出</button>
        </div>

        <div id="password-form-section"
            style="display: none; border: 1px dashed #e994c8; padding: 15px; margin-bottom: 20px; border-radius: 15px;">
            <h4 style="margin-bottom:10px;">修改密碼</h4>
            <div class="form-control"><input type="password" id="old-password" placeholder="輸入舊密碼"></div>
            <div class="form-control"><input type="password" id="new-password" placeholder="輸入新密碼 (至少6位)"></div>
            <button id="submit-change-pw" class="btn small-btn">確認修改</button>
            <button id="cancel-change-pw" class="text-link">取消</button>
            <p id="pw-message" class="message"></p>
        </div>

        <h1><img src="image/mmmm.PNG" class="header-icon" alt="貓咪"> 班費記帳系統</h1>

        <div class="balance-container">
            <h2>總餘額</h2>
            <p id="balance">$0.00</p>
        </div>

        <div class="transaction-form">
            <h3>新增費用</h3>
            <form id="add-transaction-form">
                <div class="form-control">
                    <label>項目：</label>
                    <input type="text" id="description" placeholder="例如：購買文具" required>
                </div>

                <div class="form-control">
                    <label>日期：</label>
                    <input type="date" id="date" required>
                </div>

                <div class="form-control">
                    <label>類型：</label>
                    <select id="type" class="type-select">
                        <option value="income"> 收入 </option>
                        <option value="expense" selected> 支出 </option>
                    </select>
                </div>

                <div class="form-control">
                    <label>金額：</label>
                    <input type="number" id="amount" placeholder="請輸入金額" min="0" required>
                </div>

                <div class="form-control">
                    <label>收據照片：</label>
                    <input type="file" id="receipt" accept="image/*" class="hidden-file-input">
                    <label for="receipt" class="custom-file-label">選擇照片</label>
                    <span id="file-name-display" class="file-name-display">未選擇任何檔案</span>
                </div>

                <button type="submit" class="btn">新增紀錄</button>
            </form>
        </div>

        <a href="record.html" class="btn" style="background-color: #6c757d; display: block;">查看交易紀錄</a>
    </div>
    <script src="script.js"></script>
    <!-- 📌 請把 index.html 最底部的 <script type="module"> 完整換成這段： -->
    <script type="module">
        // 📢 安全引進 Firebase 模組
        import { initializeApp, getApp, getApps } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import {
            getAuth,
            onAuthStateChanged,
            updatePassword,
            reauthenticateWithCredential,
            EmailAuthProvider
        } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD-bvmNnYsdEIkkeKPFsEakatlhyRH7xEg",
            authDomain: "meow-e7846.firebaseapp.com",
            projectId: "meow-e7846",
            storageBucket: "meow-e7846.firebasestorage.app",
            messagingSenderId: "743672734125",
            appId: "1:743672734125:web:7d9f6fb1cac5b18ef48124"
        };

        const app = getApps().length === 0 ? initializeApp(firebaseConfig) : getApp();
        const auth = getAuth(app);

        // 📋 抓取 HTML 密碼視窗元素
        const changePwBtn = document.getElementById('change-pw-btn');
        const cancelChangePwBtn = document.getElementById('cancel-change-pw');
        const passwordFormSection = document.getElementById('password-form-section');
        const oldPasswordInput = document.getElementById('old-password');
        const newPasswordInput = document.getElementById('new-password');
        const submitChangePwBtn = document.getElementById('submit-change-pw');
        const pwMessage = document.getElementById('pw-message');

        // 1. 點擊「修改密碼」顯示框框
        if (changePwBtn) {
            changePwBtn.onclick = () => {
                passwordFormSection.style.display = 'block';
                if (pwMessage) pwMessage.innerText = '';
            };
        }

        // 2. 點擊「取消」隱藏框框
        if (cancelChangePwBtn) {
            cancelChangePwBtn.onclick = () => {
                passwordFormSection.style.display = 'none';
                oldPasswordInput.value = '';
                newPasswordInput.value = '';
            };
        }

        // 3. 🔑 關鍵修正：用一個變數悄悄在背景接住「真正準備好」的雲端登入用戶
        let activeUser = null;
        onAuthStateChanged(auth, (user) => {
            if (user) {
                activeUser = user; // 雲端連線成功！順利抓到使用者，不塞車了！
            }
        });

        // 4. 🔥 「確認修改」點擊事件
        if (submitChangePwBtn) {
            submitChangePwBtn.onclick = async () => {
                const oldPassword = oldPasswordInput.value;
                const newPassword = newPasswordInput.value;

                // 確保 activeUser 已經拿到了，才執行修改
                if (!activeUser) {
                    alert("雲端連線初始化中，請稍等一秒鐘後再試一次！");
                    return;
                }

                // 💡 貼心防錯機制：檢查是不是用 Google 帳號登入的
                const isGoogleUser = activeUser.providerData.some(p => p.providerId === 'google.com');
                if (isGoogleUser) {
                    pwMessage.innerText = "提示：您目前使用 Google 帳號登入，請直接至 Google 設定中修改密碼！";
                    pwMessage.style.color = "#dc3545";
                    return;
                }

                if (!oldPassword || !newPassword) {
                    pwMessage.innerText = "提示：請填寫所有欄位！";
                    pwMessage.style.color = "red";
                    return;
                }
                if (newPassword.length < 6) {
                    pwMessage.innerText = "提示：新密碼至少需要 6 位數！";
                    pwMessage.style.color = "red";
                    return;
                }

                try {
                    pwMessage.innerText = "正在驗證舊密碼並修改...";
                    pwMessage.style.color = "orange";

                    // 驗證舊密碼
                    const credential = EmailAuthProvider.credential(activeUser.email, oldPassword);
                    await reauthenticateWithCredential(activeUser, credential);

                    // 正式修改密碼
                    await updatePassword(activeUser, newPassword);

                    alert("密碼修改成功！下次登入請使用新密碼。");
                    window.location.reload();

                } catch (error) {
                    console.error(error);
                    if (error.code === 'auth/invalid-credential' || error.code === 'auth/wrong-password') {
                        pwMessage.innerText = "修改失敗：舊密碼輸入錯誤！";
                    } else {
                        pwMessage.innerText = "修改失敗：" + error.message;
                    }
                    pwMessage.style.color = "red";
                }
            };
        }
    </script>
</body>

</html>
