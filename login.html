<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登入 - 班費記帳系統</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="header-section">
            <img src="image/mmmm.PNG" class="header-icon" alt="貓咪">
            <h1>班費記帳系統</h1>
        </div>

        <button id="google-login-btn" class="google-btn">
            <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/action/google.svg" width="20">
            使用 Google 帳號登入
        </button>

        <div class="divider">或者使用 Email 註冊</div>

        <form id="login-form">
            <div class="form-control">
                <label>帳號：</label>
                <input type="email" id="email" placeholder="請輸入 Email" required>
            </div>
            <div class="form-control">
                <label>密碼：</label>
                <input type="password" id="password" placeholder="請輸入密碼" required>
            </div>
            <button type="submit" class="btn">登入</button>

            <div class="switch-link">
                <a href="reset_password.html" class="text-link">忘記密碼？</a>
            </div>
            <div class="switch-link">
                還沒有帳號？ <a href="register.html" class="primary-link">立即註冊</a>
            </div>
        </form>
        <p id="message" class="message"></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD-bvmNnYsdEIkkeKPFsEakatlhyRH7xEg",
            authDomain: "meow-e7846.firebaseapp.com",
            projectId: "meow-e7846",
            storageBucket: "meow-e7846.firebasestorage.app",
            messagingSenderId: "743672734125",
            appId: "1:743672734125:web:7d9f6fb1cac5b18ef48124"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth();
        const provider = new GoogleAuthProvider();

       // Google 登入 (修正穩定版)
document.getElementById('google-login-btn').onclick = async () => {
    try {
        // 1. 執行登入
        const result = await signInWithPopup(auth, provider);
        const user = result.user;
        
        console.log("Google 登入成功:", user.email);
        
        // 2. 同步寫入 localStorage (確保舊程式也能讀到)
        localStorage.setItem('currentUser', user.email);
        
        // 3. 關鍵：使用 replace 確保不會因為快取回到登入頁
        window.location.replace('index.html'); 
        
    } catch (error) { 
        console.error("Google 登入失敗：", error);
        alert("登入出錯：" + error.message); 
    }
};
        // 帳密登入
        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            try {
                await signInWithEmailAndPassword(auth, email, password);
                localStorage.setItem('currentUser', email);
                window.location.href = 'index.html';
            } catch (error) { document.getElementById('message').innerText = "登入失敗"; }
        };
    </script>
</body>

</html>
