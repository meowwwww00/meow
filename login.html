<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登入 - 班費記帳系統</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="header-section">
            <img src="image/mmmm.PNG" class="header-icon" alt="貓咪">
            <h1>班費記帳系統</h1>
        </div>

        <button id="google-login-btn" class="google-btn">
            <div class="google-icon-wrapper">
                <img src="image/IMG_0745.PNG" width="18">
            </div>
            使用 Google 帳號登入
        </button>

        <div class="divider">或者使用 Email 註冊</div>

        <form id="login-form">
            <div class="form-control">
                <label>帳號：</label>
                <input type="email" id="email" placeholder="請輸入 Email" required>
            </div>
            <div class="form-control">
                <label>密碼：</label>
                <input type="password" id="password" placeholder="請輸入密碼" required>
            </div>
            <button type="submit" class="btn">登入</button>

            <div class="switch-link">
                <a href="reset_password.html" class="text-link">忘記密碼？</a>
            </div>
            <div class="switch-link">
                還沒有帳號？ <a href="register.html" class="primary-link">立即註冊</a>
            </div>
        </form>
        <p id="message" class="message"></p>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        // 💡 1. 這裡幫你多引進了 signOut 功能
        import { getAuth, signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyD-bvmNnYsdEIkkeKPFsEakatlhyRH7xEg",
            authDomain: "meow-e7846.firebaseapp.com",
            projectId: "meow-e7846",
            storageBucket: "meow-e7846.firebasestorage.app",
            messagingSenderId: "743672734125",
            appId: "1:743672734125:web:7d9f6fb1cac5b18ef48124"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth();
        const provider = new GoogleAuthProvider();

        // 💡 2. 讓 Google 登入也每次都強制彈出帳號選擇器
        provider.setCustomParameters({
            prompt: 'select_account'
        });

        // Google 登入
        document.getElementById('google-login-btn').onclick = async () => {
            try {
                const result = await signInWithPopup(auth, provider);
                localStorage.setItem('currentUser', result.user.email);
                window.location.href = 'index.html';
            } catch (error) { alert(error.message); }
        };

        // 帳密登入
        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            try {
                // A. 嘗試進行登入
                const userCredential = await signInWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // 💡 3. 關鍵攔截：偵測這個 Email 到底驗證過了沒
                if (user.emailVerified) {
                    // 通過驗證，正常放行
                    localStorage.setItem('currentUser', email);
                    window.location.href = 'index.html';
                } else {
                    // 沒通過驗證，彈出警告，並立刻強制登出
                    alert("您的 Email 尚未通過驗證！請先至信箱點擊驗證連結。");
                    await signOut(auth);
                    document.getElementById('message').innerText = "登入失敗：電子郵件未驗證";
                }
            } catch (error) {
                document.getElementById('message').innerText = "登入失敗：帳號或密碼錯誤";
            }
        };
    </script>
</body>

</html>
