<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登入 - 班費記帳系統</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1><img src="image/mmmm.PNG" class="header-icon" alt="貓咪"> 班費記帳系統</h1>

        <form id="login-form">
            <div class="form-control">
                <label for="username">帳號：</label>
                <input type="text" id="username" placeholder="請輸入帳號" required>
            </div>

            <div class="form-control">
                <label for="password">密碼：</label>
                <input type="password" id="password" placeholder="請輸入密碼" required>
            </div>

            <button type="submit" class="btn">登入</button>
            <div class="switch-link">
                <a href="reset_password.html" class="text-link">忘記密碼？</a>
            </div>
            <div class="switch-link">
                還沒有帳號？ <a href="register.html" style="color: #e994c8; font-weight: bold;">立即註冊</a>
            </div>
        </form>

        <p id="message" class="message"></p>
    </div>
    <script src="login.js"></script>
</body>

</html>
