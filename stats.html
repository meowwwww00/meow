<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <title>收支統計分析</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .stats-container {
            max-width: 800px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .stats-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .stats-table th,
        .stats-table td {
            border: 1px solid #eee;
            padding: 15px;
            text-align: center;
        }

        .stats-table th {
            background-color: #f8f9fa;
        }

        .income-text {
            color: #28a745;
            font-weight: bold;
        }

        .expense-text {
            color: #dc3545;
            font-weight: bold;
        }

        .year-selector {
            font-size: 18px;
            padding: 8px;
            border-radius: 10px;
            border: 1px solid #ddd;
            margin-bottom: 20px;
        }
    </style>
</head>

<body style="background-color: #fce4ec;">
    <div class="stats-container">
        <h2>全年度收支統計報表</h2>

        <div class="filter-controls">
            <label>選擇年份：</label>
            <select id="yearSelect" class="year-selector">

                <option value="2025">2025年</option>
                <option value="2026">2026年</option>
                <option value="2027">2027年</option>
            </select>

            <label>選擇月份：</label>
            <select id="monthSelect" class="month-selector">
                <option value="">全部月份</option>
                <option value="01">1月</option>
                <option value="02">2月</option>
                <option value="03">3月</option>
                <option value="04">4月</option>
                <option value="05">5月</option>
                <option value="06">6月</option>
                <option value="07">7月</option>
                <option value="08">8月</option>
                <option value="09">9月</option>
                <option value="10">10月</option>
                <option value="11">11月</option>
                <option value="12">12月</option>
            </select>
            <button type="button" class="filter-btn" onclick="resetFilter()">重置</button>
        </div>


        <table class="stats-table">
            <thead>
                <tr>
                    <th>月份</th>
                    <th>總收入</th>
                    <th>總支出</th>
                    <th>結餘</th>
                </tr>
            </thead>
            <tbody id="statsBody">
            </tbody>
        </table>

        <div style="margin-top: 30px;">
            <a href="record.html" class="btn" style="background-color: #ff80ab;">返回紀錄明細</a>
        </div>
    </div>

    <script src="stats.js"></script>
</body>

</html>
