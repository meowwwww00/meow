<!DOCTYPE html>
<html lang="zh-TW">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>編輯紀錄</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container"
        style="max-width: 500px; margin: 50px auto; padding: 20px; background: white; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center;">
        <h2>✏️ 編輯班費紀錄</h2>

        <div class="form-group" style="margin-bottom: 15px; text-align: left;">
            <label style="display: block; margin-bottom: 5px; font-weight: bold;">項目：</label>
            <input type="text" id="description"
                style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 5px;">
        </div>

        <div class="form-group" style="margin-bottom: 15px; text-align: left;">
            <label style="display: block; margin-bottom: 5px; font-weight: bold;">日期：</label>
            <input type="date" id="date" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 5px;">
        </div>

        <div class="form-group" style="margin-bottom: 15px; text-align: left;">
            <label style="display: block; margin-bottom: 5px; font-weight: bold;">類型：</label>
            <select id="type" style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 5px;">
                <option value="income">收入 (+)</option>
                <option value="expense">支出 (-)</option>
            </select>
        </div>

        <div class="form-group" style="margin-bottom: 15px; text-align: left;">
            <label style="display: block; margin-bottom: 5px; font-weight: bold;">金額：</label>
            <input type="number" id="amount"
                style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 5px;">
        </div>

        <button id="saveBtn"
            style="background-color: #e6a2be; color: white; padding: 12px; border: none; border-radius: 10px; width: 100%; cursor: pointer; margin-top: 20px; font-size: 1em; font-weight: bold;">儲存修改</button>
        <button onclick="history.back()"
            style="background-color: #666; color: white; padding: 12px; border: none; border-radius: 10px; width: 100%; cursor: pointer; margin-top: 10px; font-size: 1em; font-weight: bold;">取消返回</button>
    </div>
    <script type="module">
        // 1. 🌟 引入 Firebase 核心模組（路徑自動對齊你的 firebaseInit.js）
        import { db, auth } from './firebaseInit.js';
        import { doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
        import { onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

        // 2. 擷取網頁欄位元件（請確保你 edit.html 裡輸入框的 id 與這些名字一致）
        const form = document.getElementById('edit-transaction-form'); // 你的表單 ID
        const descriptionInput = document.getElementById('description');
        const amountInput = document.getElementById('amount');
        const dateInput = document.getElementById('date');
        const typeSelect = document.getElementById('type');

        // 3. 🎯 精準抓取網址後面的 ?id=XXXXX 參數
        const urlParams = new URLSearchParams(window.location.search);
        const recordId = urlParams.get('id');

        console.log("從網址偵測到要編輯的帳目 ID:", recordId);

        // 4. 監聽登入狀態
        onAuthStateChanged(auth, (user) => {
            if (user) {
                if (recordId) {
                    loadTransactionData(recordId);
                } else {
                    alert("網址缺少紀錄 ID，無法編輯！將返回主頁。");
                    window.location.href = 'index.html';
                }
            } else {
                window.location.href = 'login.html';
            }
        });

        // 5. 🚀 核心：從雲端把原本的資料抓下來，並塞回輸入框中
        async function loadTransactionData(id) {
            try {
                // ⚠️ 關鍵修正點：這裡的集合名稱必須是 "transactions"，不能寫錯！
                const docRef = doc(db, "transactions", id);
                const docSnap = await getDoc(docRef);

                if (docSnap.exists()) {
                    const data = docSnap.data();
                    console.log("成功撈到雲端原始資料:", data);

                    // 將雲端資料塞入 HTML 欄位
                    if (descriptionInput) descriptionInput.value = data.description || data.text || '';
                    if (dateInput) dateInput.value = data.date || '';
                    if (amountInput) amountInput.value = Math.abs(data.amount || 0);
                    if (typeSelect) {
                        typeSelect.value = (data.amount < 0) ? 'expense' : 'income';
                    }
                } else {
                    // ❌ 之前會跳錯就是因為沒走到上面，跑到這裡來了
                    alert("找不到該筆紀錄！請重新從明細頁點選。");
                }
            } catch (error) {
                console.error("讀取資料失敗:", error);
                alert("雲端讀取失敗：" + error.message);
            }
        }

        // 6. 💾 監聽表單送出（使用者按儲存修改）
        if (form) {
            form.addEventListener('submit', async (e) => {
                e.preventDefault();

                const rawAmount = parseFloat(amountInput.value);
                const amount = typeSelect.value === 'expense' ? -Math.abs(rawAmount) : Math.abs(rawAmount);

                try {
                    const docRef = doc(db, "transactions", recordId);

                    // 🔥 將修改後的資料寫回 Firebase
                    await updateDoc(docRef, {
                        text: descriptionInput.value,
                        description: descriptionInput.value,
                        amount: amount,
                        date: dateInput.value,
                        updatedAt: new Date()
                    });

                    alert("資料修改成功，已即時同步至雲端！");
                    window.location.href = 'index.html'; // 成功後跳回主頁或歷史頁
                } catch (error) {
                    console.error("更新失敗:", error);
                    alert("儲存修改失敗：" + error.message);
                }
            });
        }
    </script>
</body>

</html>
